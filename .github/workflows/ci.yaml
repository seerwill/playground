name: TrialFlows
on:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: block
          allowed-endpoints: >
            github.com:443
            index.crates.io:443
            static.crates.io:443
            static.rust-lang.org:443
          disable-sudo: true
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Run tests
        run: |
          cargo test --workspace --all-features --all-targets
      - name: Fail if source files were modified
              run: git diff --exit-code -- src/ lib/
